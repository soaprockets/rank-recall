# general
gpu_id: [0,1]
use_gpu: True
seed: [999]
data_path: 'data/'
emb_path: 'inter_embs/'
preprocessed_data: 'preprocessed_data/'
preprocessed_data_splitting: 'x_label'
load_preprocessed: True
checkpoint_dir: 'checkpoint'
save_recommended_topk: False #True
recommend_topk: 'recommend_topk/'

embedding_size: 64

# training settings
epochs: 100 # 1000
train_batch_size: 2048
learner: adam # adam
learning_rate: 0.001
training_neg_sample_num: 1
use_neg_sampling: True
use_full_sampling: False
eval_step: 1
stopping_step: 50
eval_test_during_training: False

# overall中修改不起作用，直接修改dataset中对应的yaml
# min_user_inter_num: 2 # 1
# min_item_inter_num: 2 # 1
# max_user_inter_num: 200  # ~
# max_item_inter_num: ~
# USER_ID_FIELD: user_id:string
# ITEM_ID_FIELD: item_id:string
# TIME_FIELD: timestamp:float
# load_cols: [user_id:string, item_id:string, timestamp:float,label:int]
# field_separator: "\t"

NEG_PREFIX: neg__

# evaluation settings
split_ratio: [0.9,0.05,0.05]
metrics: ["Recall", "NDCG", "MAP", "Precision"]
topk: [5, 10, 20, 50]
valid_metric: Recall@20
eval_batch_size: 2048

# iteration parameters
hyper_parameters: ["seed"]

